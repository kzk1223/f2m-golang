<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}}</title>
<style>
body {
	font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
	line-height: 1.7;
	margin: 0;
	background: #f6f7f9;
	color: #1f2933;
}

main {
	box-sizing: border-box;
	width: min(720px, 100%);
	margin: 0 auto;
	padding: 40px 20px;
}

.form-panel {
	background: #fff;
	border: 1px solid #d9dee6;
	border-radius: 8px;
	padding: 28px;
}

h1 {
	font-size: 24px;
	font-weight: 700;
	line-height: 1.35;
	margin: 0 0 12px;
}

p {
	margin: 0;
}
</style>
</head>
<body>
<main>
	<section class="form-panel">
		<h1>送信が完了しました</h1>
		<p>お問い合わせありがとうございました。</p>
	</section>
</main>
</body>
</html>
