<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>フォーム</title>
<style>
body {
	font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
	line-height: 1.7;
	margin: 0;
	background: #f6f7f9;
	color: #1f2933;
}

main {
	box-sizing: border-box;
	width: min(720px, 100%);
	margin: 0 auto;
	padding: 40px 20px;
}

.form-panel {
	background: #fff;
	border: 1px solid #d9dee6;
	border-radius: 8px;
	padding: 28px;
}

h1 {
	font-size: 24px;
	font-weight: 700;
	line-height: 1.35;
	margin: 0 0 24px;
}

.field {
	margin-top: 18px;
}

.f2m-error-summary {
	background: #fff4f4;
	border: 1px solid #d93f3f;
	border-radius: 6px;
	color: #8a1f1f;
	margin-bottom: 20px;
	padding: 12px 16px;
}

.f2m-error-summary ul {
	margin: 0;
	padding-left: 20px;
}

.f2m-field-error {
	color: #8a1f1f;
	font-size: 14px;
	margin: 6px 0 0;
}

[aria-invalid="true"] {
	border-color: #d93f3f;
}

label {
	display: block;
	font-weight: 700;
	margin-bottom: 6px;
}

input,
textarea {
	box-sizing: border-box;
	width: 100%;
	border: 1px solid #b8c0cc;
	border-radius: 6px;
	font: inherit;
	padding: 10px 12px;
}

textarea {
	min-height: 144px;
	resize: vertical;
}

.choices {
	display: grid;
	gap: 8px;
}

.choice {
	display: flex;
	align-items: center;
	gap: 8px;
	font-weight: 400;
	margin: 0;
}

.choice input {
	width: auto;
}

.actions {
	display: flex;
	justify-content: flex-end;
	margin-top: 28px;
}

button {
	border: 0;
	border-radius: 6px;
	background: #1f5f8f;
	color: #fff;
	cursor: pointer;
	font: inherit;
	font-weight: 700;
	padding: 10px 18px;
}
</style>
</head>
<body>
<main>
	<section class="form-panel">
		<h1>フォーム</h1>
		<form method="post" action="/" enctype="multipart/form-data">
			<input type="hidden" name="F2M_ID" value="contact">
			<div class="field">
				<label for="name">お名前</label>
				<input id="name" type="text" name="name">
			</div>
			<div class="field">
				<label for="mail">メールアドレス</label>
				<input id="mail" type="email" name="mail">
			</div>
			<div class="field">
				<label for="mail2">メールアドレス確認用</label>
				<input id="mail2" type="email" name="mail2">
			</div>
			<div class="field">
				<label>性別</label>
				<div class="choices">
					<label class="choice"><input type="radio" name="gender" value="男性">男性</label>
					<label class="choice"><input type="radio" name="gender" value="女性">女性</label>
					<label class="choice"><input type="radio" name="gender" value="回答しない">回答しない</label>
				</div>
			</div>
			<div class="field">
				<label>興味のある内容</label>
				<div class="choices">
					<label class="choice"><input type="checkbox" name="interest" value="資料請求">資料請求</label>
					<label class="choice"><input type="checkbox" name="interest" value="見積依頼">見積依頼</label>
					<label class="choice"><input type="checkbox" name="interest" value="相談したい">相談したい</label>
				</div>
			</div>
			<div class="field">
				<label for="contact">お問い合わせ内容</label>
				<textarea id="contact" name="contact"></textarea>
			</div>
			<div class="field">
				<label for="attachment">添付ファイル</label>
				<input id="attachment" type="file" name="attachment">
			</div>
			<div class="actions">
				<button type="submit">確認する</button>
			</div>
		</form>
	</section>
</main>
</body>
</html>
